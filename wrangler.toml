name = "iq-test-webapp"
main = "worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "all-lifes.com/iq-test*", zone_name = "all-lifes.com" },
  { pattern = "all-lifes.com/hi/iq-test*", zone_name = "all-lifes.com" },
  { pattern = "all-lifes.com/ru/iq-test*", zone_name = "all-lifes.com" },
  { pattern = "all-lifes.com/vi/iq-test*", zone_name = "all-lifes.com" },
  { pattern = "all-lifes.com/tr/iq-test*", zone_name = "all-lifes.com" }
]

[assets]
directory = "."
binding = "ASSETS"

[[kv_namespaces]]
binding = "SUBSCRIBERS"
id = "97ed79dd4e8b4a7193f9bad2185648a6"
