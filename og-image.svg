<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#3730a3"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <clipPath id="roundedCard">
      <rect x="680" y="90" width="460" height="450" rx="32"/>
    </clipPath>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 배경 원형 장식 -->
  <circle cx="980" cy="80" r="200" fill="#6366f1" opacity="0.12"/>
  <circle cx="150" cy="550" r="160" fill="#4f46e5" opacity="0.15"/>
  <circle cx="1150" cy="580" r="120" fill="#818cf8" opacity="0.1"/>

  <!-- 배경 점 패턴 -->
  <g opacity="0.15">
    <circle cx="60" cy="60" r="3" fill="#a5b4fc"/>
    <circle cx="120" cy="60" r="3" fill="#a5b4fc"/>
    <circle cx="180" cy="60" r="3" fill="#a5b4fc"/>
    <circle cx="60" cy="120" r="3" fill="#a5b4fc"/>
    <circle cx="120" cy="120" r="3" fill="#a5b4fc"/>
    <circle cx="180" cy="120" r="3" fill="#a5b4fc"/>
    <circle cx="60" cy="180" r="3" fill="#a5b4fc"/>
    <circle cx="120" cy="180" r="3" fill="#a5b4fc"/>
    <circle cx="180" cy="180" r="3" fill="#a5b4fc"/>
  </g>

  <!-- 왼쪽 메인 텍스트 영역 -->
  <!-- 배지 -->
  <rect x="60" y="120" width="220" height="36" rx="18" fill="#ffffff" opacity="0.15"/>
  <text x="170" y="143" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#c7d2fe" text-anchor="middle" letter-spacing="1">🧠 과학적으로 검증된</text>

  <!-- 메인 타이틀 -->
  <text x="60" y="220" font-family="Arial,'맑은 고딕',sans-serif" font-size="68" font-weight="900" fill="#ffffff" letter-spacing="-1">무료 IQ 테스트</text>

  <!-- 서브 타이틀 -->
  <text x="60" y="278" font-family="Arial,'맑은 고딕',sans-serif" font-size="26" fill="#a5b4fc" font-weight="400">온라인 지능지수 측정 &amp; 심층 분석</text>

  <!-- 구분선 -->
  <rect x="60" y="305" width="80" height="4" rx="2" fill="#6366f1"/>

  <!-- 특징 목록 -->
  <g font-family="Arial,'맑은 고딕',sans-serif" font-size="18" fill="#c7d2fe">
    <text x="60" y="350">✓  레이븐 행렬 · CHC 이론 기반</text>
    <text x="60" y="385">✓  단기(15문항) · 정밀(40문항) 선택</text>
    <text x="60" y="420">✓  EQ · 기억력 · 창의성 확장 검사</text>
    <text x="60" y="455">✓  회원가입 없이 즉시 무료 결과 확인</text>
  </g>

  <!-- 하단 URL 배지 -->
  <rect x="60" y="490" width="320" height="44" rx="22" fill="#4f46e5" opacity="0.7"/>
  <text x="220" y="517" font-family="Arial,monospace" font-size="15" fill="#e0e7ff" text-anchor="middle" font-weight="600">all-lifes.com · IQ 테스트</text>

  <!-- 오른쪽 결과 카드 -->
  <rect x="680" y="90" width="460" height="450" rx="32" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- 카드 상단 라벨 -->
  <text x="910" y="145" font-family="Arial,'맑은 고딕',sans-serif" font-size="15" fill="#a5b4fc" text-anchor="middle" font-weight="600" letter-spacing="2">검사 결과</text>

  <!-- IQ 점수 링 -->
  <circle cx="910" cy="275" r="100" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="16"/>
  <circle cx="910" cy="275" r="100" fill="none" stroke="url(#ring)" stroke-width="16" stroke-linecap="round"
    stroke-dasharray="565" stroke-dashoffset="113"
    transform="rotate(-90 910 275)" filter="url(#glow)"/>

  <!-- IQ 점수 숫자 -->
  <text x="910" y="258" font-family="Arial,sans-serif" font-size="62" font-weight="900" fill="#ffffff" text-anchor="middle">128</text>
  <text x="910" y="290" font-family="Arial,sans-serif" font-size="14" fill="#a5b4fc" text-anchor="middle" font-weight="600" letter-spacing="1">IQ SCORE</text>

  <!-- 카테고리 라벨 -->
  <rect x="822" y="308" width="176" height="32" rx="16" fill="#6366f1" opacity="0.6"/>
  <text x="910" y="329" font-family="Arial,'맑은 고딕',sans-serif" font-size="14" fill="#e0e7ff" text-anchor="middle" font-weight="700">우수 · 상위 3%</text>

  <!-- 하단 통계 3개 -->
  <g font-family="Arial,'맑은 고딕',sans-serif">
    <!-- 정확도 -->
    <rect x="700" y="420" width="130" height="80" rx="16" fill="#ffffff" opacity="0.08"/>
    <text x="765" y="452" font-size="28" font-weight="900" fill="#ffffff" text-anchor="middle">93%</text>
    <text x="765" y="472" font-size="12" fill="#a5b4fc" text-anchor="middle">정답률</text>

    <!-- 소요시간 -->
    <rect x="845" y="420" width="130" height="80" rx="16" fill="#ffffff" opacity="0.08"/>
    <text x="910" y="452" font-size="28" font-weight="900" fill="#ffffff" text-anchor="middle">18분</text>
    <text x="910" y="472" font-size="12" fill="#a5b4fc" text-anchor="middle">소요 시간</text>

    <!-- 문항수 -->
    <rect x="990" y="420" width="130" height="80" rx="16" fill="#ffffff" opacity="0.08"/>
    <text x="1055" y="452" font-size="28" font-weight="900" fill="#ffffff" text-anchor="middle">40문</text>
    <text x="1055" y="472" font-size="12" fill="#a5b4fc" text-anchor="middle">정밀 버전</text>
  </g>

  <!-- 하단 워터마크 -->
  <text x="600" y="610" font-family="Arial,sans-serif" font-size="13" fill="#6366f1" text-anchor="middle" opacity="0.7">Raven's Progressive Matrices · CHC Theory · Cronbach's α .85~.92</text>
</svg>
