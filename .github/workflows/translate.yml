name: Auto-translate lang files (Gemini)

on:
  workflow_dispatch:   # GitHub 웹에서 수동으로 실행

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 번역 결과를 자동 커밋하기 위해 필요

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run translator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node translate-auto.js

      - name: Commit updated lang files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lang/
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Auto-translate: update lang files via Gemini"
          git push
